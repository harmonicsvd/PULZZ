openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pulzz — pre-release music discovery platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: songs
    description: Song discovery pool
  - name: reactions
    description: Listener reactions to songs
  - name: moments
    description: Moment mark timestamps during playback
  - name: artists
    description: Artist operations
  - name: listeners
    description: Listener profiles
  - name: wall
    description: Discovery Wall leaderboard
  - name: musixmatch
    description: Musixmatch catalog proxy (genres, search, synced lyrics, analysis)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /songs:
    get:
      operationId: listSongs
      tags: [songs]
      summary: List songs in discovery pool
      parameters:
        - name: genre
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, released]
      responses:
        "200":
          description: List of songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"
    post:
      operationId: submitSong
      tags: [songs]
      summary: Artist submits a song to the discovery pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SongInput"
      responses:
        "201":
          description: Song submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"

  /songs/{id}:
    get:
      operationId: getSong
      tags: [songs]
      summary: Get a single song with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Song detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongDetail"
        "404":
          description: Not found

  /songs/{id}/lyrics:
    put:
      operationId: updateSongLyrics
      tags: [songs]
      summary: Save synced (LRC) lyrics for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSongLyrics"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSongLyricsResult"
        "404":
          description: Not found

  /songs/{id}/analysis:
    put:
      operationId: updateSongAnalysis
      tags: [songs]
      summary: Update a song's lyrics analysis (mood, themes, language)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSongAnalysis"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSongAnalysisResult"
        "404":
          description: Not found

  /songs/{id}/streaming-id:
    put:
      operationId: updateSongStreamingId
      tags: [songs]
      summary: Attach a released-track identifier (ISRC or Spotify link) to a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStreamingId"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStreamingIdResult"
        "404":
          description: Not found

  /songs/{id}/songstats:
    get:
      operationId: getSongSongstats
      tags: [songs]
      summary: Get post-release performance stats for a song from Songstats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post-release stats (or a fallback state when unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongstatsResult"
        "404":
          description: Not found

  /songs/{id}/sound-analysis:
    get:
      operationId: getSongSoundAnalysis
      tags: [songs]
      summary: Get Cyanite sound-based analysis for a song (lazily syncs if still processing)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current sound-analysis state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoundAnalysisResult"
        "404":
          description: Not found
    put:
      operationId: updateSongSoundAnalysis
      tags: [songs]
      summary: Save artist edits to a song's Sound DNA (overrides the AI-derived analysis)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSoundAnalysis"
      responses:
        "200":
          description: Saved sound-analysis state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoundAnalysisResult"
        "404":
          description: Not found

  /songs/{id}/analyze:
    post:
      operationId: analyzeSong
      tags: [songs]
      summary: Trigger (or re-trigger) Cyanite sound analysis for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeSongResult"
        "404":
          description: Not found

  /songs/{id}/release:
    put:
      operationId: setSongRelease
      tags: [songs]
      summary: Mark a song as released (or revert), triggering release-day notifications
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSongReleaseInput"
      responses:
        "200":
          description: Release state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetSongReleaseResult"
        "404":
          description: Not found

  /songs/{id}/reactions:
    get:
      operationId: getSongReactions
      tags: [songs]
      summary: Get aggregated reaction stats for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reaction stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongReactions"

  /songs/{id}/moments:
    get:
      operationId: getSongMoments
      tags: [songs]
      summary: Get moment mark heatmap for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Moment marks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MomentMark"

  /reactions:
    post:
      operationId: createReaction
      tags: [reactions]
      summary: Submit a Discovered or Skip reaction after listening
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "201":
          description: Reaction recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reaction"

  /moment-marks:
    post:
      operationId: createMomentMark
      tags: [moments]
      summary: Record a moment mark timestamp during playback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MomentMarkInput"
      responses:
        "201":
          description: Moment mark recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MomentMark"

  /wall:
    get:
      operationId: getWall
      tags: [wall]
      summary: Get Discovery Wall leaderboard
      parameters:
        - name: artistId
          in: query
          description: When provided, ranks only listeners who discovered this artist's songs (per-artist discovery counts and points). When omitted, ranks all listeners by their global points.
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WallEntry"

  /artists:
    get:
      operationId: listArtists
      tags: [artists]
      summary: List all artists with their collaboration profiles
      responses:
        "200":
          description: List of artists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artist"
    post:
      operationId: createArtist
      tags: [artists]
      summary: Register an artist account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtistInput"
      responses:
        "201":
          description: Artist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"

  /artists/{id}:
    get:
      operationId: getArtist
      tags: [artists]
      summary: Get artist profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
    put:
      operationId: updateArtist
      tags: [artists]
      summary: Update an artist's profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArtistInput"
      responses:
        "200":
          description: Updated artist profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artist"
        "404":
          description: Not found

  /artists/{id}/songs:
    get:
      operationId: getArtistSongs
      tags: [artists]
      summary: Get all songs submitted by an artist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artist songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Song"

  /artists/{id}/dashboard:
    get:
      operationId: getArtistDashboard
      tags: [artists]
      summary: Get dashboard summary stats for an artist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtistDashboard"

  /listeners:
    post:
      operationId: createListener
      tags: [listeners]
      summary: Register or update listener profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListenerInput"
      responses:
        "201":
          description: Listener profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listener"

  /listeners/{id}:
    get:
      operationId: getListener
      tags: [listeners]
      summary: Get listener profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listener profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listener"

  /listeners/{id}/release-subscriptions:
    post:
      operationId: subscribeRelease
      tags: [listeners]
      summary: Opt a listener in to a release-day notification for a song
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseSubscriptionInput"
      responses:
        "201":
          description: Subscription created (or already existed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseSubscription"
        "404":
          description: Listener or song not found

  /listeners/{id}/release-subscriptions/{songId}:
    delete:
      operationId: unsubscribeRelease
      tags: [listeners]
      summary: Opt a listener out of a song's release-day notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: songId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription removed (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /listeners/{id}/release-notifications:
    get:
      operationId: getReleaseNotifications
      tags: [listeners]
      summary: Pending release-day notifications for songs the listener discovered
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending release notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReleaseNotification"
    post:
      operationId: ackReleaseNotifications
      tags: [listeners]
      summary: Acknowledge release-day notifications so they are not shown again
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AckReleaseNotificationsInput"
      responses:
        "200":
          description: Notifications acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AckReleaseNotificationsResult"

  /musixmatch/genres:
    get:
      operationId: listMusixmatchGenres
      tags: [musixmatch]
      summary: List Musixmatch music genres
      responses:
        "200":
          description: Genre list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MusixmatchGenre"

  /musixmatch/search-tracks:
    get:
      operationId: searchMusixmatchTracks
      tags: [musixmatch]
      summary: Search released tracks for taste seeding
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Matching tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MusixmatchTrack"

  /musixmatch/subtitle:
    get:
      operationId: getMusixmatchSubtitle
      tags: [musixmatch]
      summary: Get synced (LRC) lyrics for a released track
      parameters:
        - name: trackId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subtitle result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusixmatchSubtitle"

  /musixmatch/track-analysis:
    get:
      operationId: getMusixmatchAnalysis
      tags: [musixmatch]
      summary: Get lyrics analysis (moods and themes) for a released track
      parameters:
        - name: trackId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusixmatchAnalysis"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Song:
      type: object
      required: [id, title, artistName, genre, releaseDate, daysUntilRelease, status, coverColor, tags]
      properties:
        id:
          type: integer
        title:
          type: string
        artistName:
          type: string
        genre:
          type: string
        releaseDate:
          type: string
        daysUntilRelease:
          type: integer
        status:
          type: string
          enum: [active, released]
        coverColor:
          type: string
        tags:
          type: array
          items:
            type: string
        audioUrl:
          type: ["string", "null"]
        artworkUrl:
          type: ["string", "null"]
        durationSeconds:
          type: ["integer", "null"]
        discoveredCount:
          type: ["integer", "null"]
        skipCount:
          type: ["integer", "null"]
        analysis:
          oneOf:
            - $ref: "#/components/schemas/SongAnalysis"
            - type: "null"
        license:
          oneOf:
            - $ref: "#/components/schemas/SongLicense"
            - type: "null"
        soundProfile:
          oneOf:
            - $ref: "#/components/schemas/SoundProfile"
            - type: "null"

    SongInput:
      type: object
      required: [title, artistId, genre, releaseDate, isrc, story]
      properties:
        title:
          type: string
        artistId:
          type: integer
        genre:
          type: string
        language:
          type: string
        releaseDate:
          type: string
        releaseTime:
          type: string
        distributor:
          type: string
        isrc:
          type: string
        streamingId:
          type: string
        audioUrl:
          type: string
        story:
          type: string
        lyrics:
          type: ["string", "null"]
        credits:
          $ref: "#/components/schemas/SongCredits"
        instruments:
          type: array
          items:
            type: string
        durationSeconds:
          type: integer

    SongDetail:
      type: object
      required: [id, title, artistName, genre, releaseDate, daysUntilRelease, status, coverColor, tags, story]
      properties:
        id:
          type: integer
        title:
          type: string
        artistName:
          type: string
        genre:
          type: string
        releaseDate:
          type: string
        releaseTime:
          type: ["string", "null"]
        distributor:
          type: ["string", "null"]
        daysUntilRelease:
          type: integer
        status:
          type: string
          enum: [active, released]
        coverColor:
          type: string
        tags:
          type: array
          items:
            type: string
        story:
          type: string
        lyrics:
          type: ["string", "null"]
        lrc:
          type: ["string", "null"]
          description: Synced lyrics in LRC format ([mm:ss.xx] line)
        credits:
          oneOf:
            - $ref: "#/components/schemas/SongCredits"
            - type: "null"
        audioUrl:
          type: ["string", "null"]
        artworkUrl:
          type: ["string", "null"]
        durationSeconds:
          type: ["integer", "null"]
        instruments:
          type: array
          items:
            type: string
        isrc:
          type: ["string", "null"]
        streamingId:
          type: ["string", "null"]
          description: Artist-supplied released-track identifier (ISRC or Spotify link) used for Songstats lookups
        discoveredCount:
          type: ["integer", "null"]
        skipCount:
          type: ["integer", "null"]
        momentCount:
          type: ["integer", "null"]
        analysis:
          oneOf:
            - $ref: "#/components/schemas/SongAnalysis"
            - type: "null"
        license:
          oneOf:
            - $ref: "#/components/schemas/SongLicense"
            - type: "null"

    SongAnalysis:
      type: object
      properties:
        mood:
          type: array
          items:
            type: string
        themes:
          type: array
          items:
            type: string
        language:
          type: ["string", "null"]

    SongCredits:
      type: object
      properties:
        lyricist:
          type: string
        composer:
          type: string
        vocalist:
          type: string
        mixEngineer:
          type: string
        masteringEngineer:
          type: string
        producer:
          type: string

    SongLicense:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: License classification, e.g. "Public Domain".
        detail:
          type: string
          description: Human-readable license rationale or terms.
        source:
          type: string
          description: Attribution / source URL for the recording.

    UpdateSongLyrics:
      type: object
      required: [lrc]
      properties:
        lrc:
          type: string
          description: Synced lyrics in LRC format

    UpdateSongLyricsResult:
      type: object
      required: [ok, lrc]
      properties:
        ok:
          type: boolean
        lrc:
          type: string

    UpdateSongAnalysis:
      type: object
      required: [mood, themes]
      properties:
        mood:
          type: array
          items:
            type: string
        themes:
          type: array
          items:
            type: string
        language:
          type: ["string", "null"]

    UpdateSongAnalysisResult:
      type: object
      required: [ok, analysis]
      properties:
        ok:
          type: boolean
        analysis:
          $ref: "#/components/schemas/SongAnalysis"

    UpdateStreamingId:
      type: object
      required: [streamingId]
      properties:
        streamingId:
          type: string
          description: ISRC, Spotify track id, or Spotify track URL. Empty string clears it.

    UpdateSoundAnalysis:
      type: object
      required: [genreTags, moodTags]
      description: Artist-supplied overrides for a song's Sound DNA. Genre/mood distributions are preserved server-side; only these scalar/tag fields are editable.
      properties:
        genreTags:
          type: array
          items:
            type: string
        moodTags:
          type: array
          items:
            type: string
        bpm:
          type: ["integer", "null"]
        musicalKey:
          type: ["string", "null"]
        energyLevel:
          type: ["string", "null"]
        energyDynamics:
          type: ["string", "null"]
        valence:
          type: ["number", "null"]
        arousal:
          type: ["number", "null"]
        caption:
          type: ["string", "null"]
        era:
          type: ["string", "null"]

    UpdateStreamingIdResult:
      type: object
      required: [ok, streamingId]
      properties:
        ok:
          type: boolean
        streamingId:
          type: ["string", "null"]

    SongstatsSource:
      type: object
      required: [source]
      properties:
        source:
          type: string
        streamsTotal:
          type: ["integer", "null"]
        streamsCurrent:
          type: ["integer", "null"]
        playsTotal:
          type: ["integer", "null"]
        viewsTotal:
          type: ["integer", "null"]
        playlistsTotal:
          type: ["integer", "null"]
        playlistsCurrent:
          type: ["integer", "null"]
        playlistReachTotal:
          type: ["integer", "null"]
        chartsTotal:
          type: ["integer", "null"]
        chartsCurrent:
          type: ["integer", "null"]
        videosTotal:
          type: ["integer", "null"]
        creatorReachTotal:
          type: ["integer", "null"]
