kind = "web"
previewPath = "/"
title = "Pulzz — Welcome"
version = "1.0.0"
id = "artifacts/pulzz-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19896

[services.development]
run = "pnpm --filter @workspace/pulzz-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pulzz-landing", "run", "build" ]
publicDir = "artifacts/pulzz-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19896"
BASE_PATH = "/"
