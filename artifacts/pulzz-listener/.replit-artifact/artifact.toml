kind = "mobile"
previewPath = "/pulzz-listener/"
title = "Pulzz — Listener App"
version = "1.0.0"
id = "artifacts/pulzz-listener"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/pulzz-listener/" ]
localPort = 24313

[services.development]
run = "pnpm --filter @workspace/pulzz-listener run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pulzz-listener", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pulzz-listener", "run", "serve" ]

[services.env]
PORT = "24313"
BASE_PATH = "/pulzz-listener/"
